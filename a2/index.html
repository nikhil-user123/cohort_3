<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insect UI</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="main-container">
      <section class="left-panel">
        <header>
          <div class="logo">INSECT</div>
          <div class="search-bar">
            <input type="text" placeholder="Search..." />
          </div>
        </header>

        <div class="sidebar-text">Classification</div>

        <div class="list_container">
          <div class="classification-list">
            <div class="item">
              <span>Class:</span><br />
              <p>Insecta</p>
            </div>
            <hr />
            <div class="item">
              <span>Order:</span><br />
              <p>Coleoptera</p>
            </div>
            <hr />
            <div class="item">
              <span>Family:</span><br />
              <p>Cerambycidae</p>
            </div>
            <hr />
            <div class="item">
              <span>Sub-Family:</span><br />
              <p>Cerambycinae</p>
            </div>
            <hr />
            <div class="item">
              <span>Tribe:</span><br />
              <p>Callicromatini</p>
            </div>
            <hr />
            <div class="item">
              <span>Genus:</span><br />
              <p>Pachyteria</p>
            </div>
            <hr />
          </div>
        </div>
      </section>

      <section class="right-panel">
        <nav class="top-nav">
          <a href="#">Home</a>
          <a href="#">Shop</a>
          <a href="#">About</a>
          <a href="#">Gallery</a>
          <a href="#">Contact</a>
        </nav>
        <div class="container_right">
          <div class="content">
            <h1 class="cockroach_name">Pachyteria<br />equestris</h1>

            <div class="insect_details">
              <div class="insect_img">
                <img src="./image/insect (1).png" alt="" />
              </div>
              <div class="p_info">
                <p><strong>Locality:</strong> Malaysia</p>
                <p><strong>Sex:</strong> Male</p>
                <p><strong>Size:</strong> 32 mm / 12 mm</p>
              </div>
            </div>

            <div class="price">$5.99</div>

            <div>
              <label class="switch">
                <input type="checkbox" /> View detailed antennae
              </label>
              <label class="switch">
                <input type="checkbox" /> View underside
              </label>
            </div>

            <button class="btn">Add to collection</button>
          </div>
        </div>
      </section>

      <div class="insect-display">
        <img
          src="./image/Screenshot_2026-05-12_13-04-02-removebg-preview.png"
          alt="Pachyteria Equestris"
        />
      </div>
    </div>
  </body>
</html>
